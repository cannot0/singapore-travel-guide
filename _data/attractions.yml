# Singapore Attractions Data
# 原有基础景点 + 需求新增8个完整景点，分类匹配页面四大板块
- name: 滨海湾花园
  category: 必游景点
  rating: 5
  description: 新加坡的标志性景点，拥有壮观的超级树和室内花园。占地101公顷，是新加坡最热门的旅游景点之一。
  location: 滨海湾地区
  image: /assets/images/attractions/gardens-by-the-bay.jpg
  url: /attractions/gardens-by-the-bay/
  featured: true
  hours: 每天 05:00-02:00
  price: 免费入场（温室需购票）
  tips:
    - 建议傍晚前往，可以同时欣赏日景和夜景
    - 超级树灯光秀免费观看
    - 温室建议提前在线购票

- name: 圣淘沙岛
  category: 必游景点
  rating: 4
  description: 集娱乐、购物、海滩于一体的度假胜地。拥有环球影城、S.E.A.海洋馆等众多景点。
  location: 圣淘沙岛
  image: /assets/images/attractions/sentosa.jpg
  url: /attractions/sentosa/
  featured: true
  hours: 全天开放（各景点营业时间不同）
  price: 入岛免费（各景点单独收费）
  tips:
    - 建议至少安排一整天时间
    - 可以购买套票节省开支
    - 海滩区域免费进入

- name: 鱼尾狮公园
  category: 必游景点
  rating: 5
  description: 新加坡的象征，必打卡的地标性景点。鱼尾狮雕像是新加坡的标志，位于滨海湾。
  location: 滨海湾
  image: /assets/images/attractions/merlion-park.jpg
  url: /attractions/merlion-park/
  featured: true
  hours: 全天开放
  price: 免费
  tips:
    - 建议清晨或傍晚前往，避开人流高峰
    - 可以拍摄鱼尾狮喷水的经典照片
    - 附近有多个拍照点

